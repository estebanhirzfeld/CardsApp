<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1152d4",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Manrope"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>My Wallet - Minimalist Card Storage</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex min-h-screen w-full flex-col max-w-md mx-auto overflow-x-hidden">

<header class="sticky top-0 z-20 flex items-center justify-between px-6 py-8 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md">
<div class="flex items-center justify-center w-10 h-10 rounded-full bg-slate-200/50 dark:bg-slate-800/50 text-slate-700 dark:text-slate-300">
<span class="material-symbols-outlined text-2xl">search</span>
</div>
<h1 class="text-xl font-extrabold tracking-tight">My Wallet</h1>

<span class="material-symbols-outlined text-2xl">add</span>
</button>
</header>
<!-- Card Stack Section -->
<main class="flex-1 px-6 pb-12 space-y-10">

<div class="group relative">
<div class="overflow-hidden rounded-xl shadow-xl transition-all duration-300 hover:-translate-y-1 hover:shadow-2xl">
<div class="aspect-[1.58/1] w-full bg-gradient-to-br from-primary to-blue-700 p-6 flex flex-col justify-between text-white relative overflow-hidden" data-alt="Deep blue geometric pattern credit card design">
<div class="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full -mr-16 -mt-16 blur-3xl"></div>
<div class="flex justify-between items-start">
<span class="text-xs font-medium tracking-widest uppercase opacity-80">Primary Card</span>
<span class="material-symbols-outlined text-3xl opacity-90">contactless</span>
</div>
<div>
<p class="text-2xl font-bold tracking-[0.2em] mb-4">•••• 4242</p>
<div class="flex justify-between items-end">
<div>
<p class="text-[10px] uppercase tracking-widest opacity-60">Card Holder</p>
<p class="text-sm font-semibold tracking-wide">ALEXANDER J. REED</p>
</div>
<div class="text-right">
<p class="text-[10px] uppercase tracking-widest opacity-60">Expires</p>
<p class="text-sm font-semibold tracking-wide">12/28</p>
</div>
</div>
</div>
</div>
</div>
</div>

<div class="absolute bottom-0 left-0 w-40 h-40 bg-primary/20 rounded-full -ml-20 -mb-20 blur-3xl"></div>
<div class="flex justify-between items-start">
<span class="text-xs font-medium tracking-widest uppercase opacity-80">Travel Rewards</span>
<div class="w-10 h-6 bg-white/10 rounded-md backdrop-blur-sm border border-white/20"></div>
</div>
<div>
<p class="text-2xl font-bold tracking-[0.2em] mb-4">•••• 8812</p>
<div class="flex justify-between items-end">
<div>
<p class="text-[10px] uppercase tracking-widest opacity-60">Card Holder</p>
<p class="text-sm font-semibold tracking-wide">ALEXANDER J. REED</p>
</div>
<div class="text-right">
<p class="text-[10px] uppercase tracking-widest opacity-60">Expires</p>
<p class="text-sm font-semibold tracking-wide">05/26</p>
</div>
</div>
</div>
</div>
</div>
</div>

<div class="overflow-hidden rounded-xl shadow-lg transition-all duration-300 hover:-translate-y-1 hover:shadow-2xl">
<div class="aspect-[1.58/1] w-full bg-gradient-to-br from-indigo-500 to-purple-600 p-6 flex flex-col justify-between text-white relative overflow-hidden" data-alt="Vibrant purple and indigo abstract gradient card">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full bg-[radial-gradient(circle,rgba(255,255,255,0.1)_0%,transparent_70%)]"></div>
<div class="flex justify-between items-start">
<span class="text-xs font-medium tracking-widest uppercase opacity-80">Digital Wallet</span>
<span class="material-symbols-outlined text-3xl opacity-90">account_balance_wallet</span>
</div>
<div>
<p class="text-2xl font-bold tracking-[0.2em] mb-4">•••• 0056</p>
<div class="flex justify-between items-end">
<div>
<p class="text-[10px] uppercase tracking-widest opacity-60">Card Holder</p>
<p class="text-sm font-semibold tracking-wide">ALEXANDER J. REED</p>
</div>
<div class="text-right">
<p class="text-[10px] uppercase tracking-widest opacity-60">Expires</p>
<p class="text-sm font-semibold tracking-wide">09/27</p>
</div>
</div>
</div>
</div>
</div>
</div>
<!-- Card 4 (Empty/Add New State Style) -->
<div class="group relative">
<div class="aspect-[1.58/1] w-full rounded-xl border-2 border-dashed border-slate-300 dark:border-slate-700 flex flex-col items-center justify-center gap-4 text-slate-400 dark:text-slate-600 hover:border-primary hover:text-primary transition-colors cursor-pointer">
<div class="w-12 h-12 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center group-hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-3xl">add_card</span>
</div>
<span class="text-sm font-bold tracking-wide">Add New Card</span>
</div>
</div>
</main>
<!-- Aesthetic Footer Space -->
<footer class="h-12 bg-transparent"></footer>
</div>
</body></html>
