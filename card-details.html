<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1152d4",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Card Details - Wallet App</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased text-slate-900 dark:text-slate-100">
<div class="relative flex h-auto min-h-screen w-full max-w-md mx-auto flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<!-- Top Navigation -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between sticky top-0 z-10">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center cursor-pointer">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">Card Details</h2>
<div class="flex w-12 items-center justify-end">
<button class="flex size-12 cursor-pointer items-center justify-center rounded-xl bg-transparent text-slate-900 dark:text-slate-100 p-0">
<span class="material-symbols-outlined text-2xl">more_vert</span>
</button>
</div>
</div>
<div class="p-4 space-y-6">
<!-- Card Visual Representation -->
<div class="relative group">
<div class="w-full aspect-[1.58/1] rounded-xl overflow-hidden shadow-xl bg-gradient-to-br from-primary to-blue-900 flex flex-col justify-between p-6 text-white relative">
<div class="absolute inset-0 opacity-20" data-alt="Subtle geometric pattern texture for credit card" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuACpksuEt_rK0eAkAKsVaUcjjDccInbJXEz7Qm1S2hl--dDjO_2PdwuwSUY5E8ON6oy_-pAA3yjamWOdOk3_gXw-opMeHoLy_XLGibXju0gtA56-zNZgcoSXYNwmS7h0LRq4styR7dywyUfpy3j6p09yRFTARQexsUGQ-cxN1Fuy6LQuqZcnlZZEdT9HI2rnPxLb7l6MmOeOo6S4X-d9ttSYrLGN25r-utGx4r5XkzWKEll4r2ruu4OQt9QUie1a2BmFTqxV0F_9ag");'></div>
<div class="relative z-10 flex justify-between items-start">
<div class="flex flex-col">
<span class="text-xs font-medium opacity-80 uppercase tracking-widest">Elite Rewards</span>
<span class="text-lg font-bold">Infinite Visa</span>
</div>
<div class="size-10 rounded-full bg-white/20 backdrop-blur-md flex items-center justify-center">
<span class="material-symbols-outlined text-white text-xl">contactless</span>
</div>
</div>
<div class="relative z-10">
<p class="text-xl font-medium tracking-[0.2em] mb-4">•••• •••• •••• 1234</p>
<div class="flex justify-between items-end">
<div class="flex gap-6">
<div class="flex flex-col">
<span class="text-[10px] uppercase opacity-70">Expiry</span>
<span class="text-sm font-semibold">12/26</span>
</div>
<div class="flex flex-col">
<span class="text-[10px] uppercase opacity-70">CVV</span>
<span class="text-sm font-semibold">***</span>
</div>
</div>
<div class="h-8 w-12 bg-white/10 rounded backdrop-blur-sm border border-white/20 flex items-center justify-center italic font-black text-xs">VISA</div>
</div>
</div>
</div>
</div>
<!-- Quick Actions Label -->
<div class="space-y-4">
<h3 class="text-slate-900 dark:text-slate-100 text-sm font-bold uppercase tracking-wider px-1">Payment Details</h3>
<!-- Primary Copy Actions -->
<div class="space-y-3">
<!-- Card Number -->
<div class="flex items-center gap-4 bg-white dark:bg-slate-800/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm">
<div class="text-primary flex items-center justify-center rounded-lg bg-primary/10 shrink-0 size-12">
<span class="material-symbols-outlined">credit_card</span>
</div>
<div class="flex flex-col flex-1">
<p class="text-slate-500 dark:text-slate-400 text-xs font-medium uppercase">Card Number</p>
<p class="text-slate-900 dark:text-slate-100 text-base font-bold tracking-tight">5234 5678 9012 3456</p>
</div>
<button class="flex size-10 items-center justify-center rounded-lg bg-primary text-white hover:bg-primary/90 transition-colors">
<span class="material-symbols-outlined text-xl">content_copy</span>
</button>
</div>
<div class="grid grid-cols-2 gap-3">
<!-- Expiry -->
<div class="flex items-center gap-3 bg-white dark:bg-slate-800/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm">
<div class="flex flex-col flex-1">
<p class="text-slate-500 dark:text-slate-400 text-[10px] font-medium uppercase">Expiry Date</p>
<p class="text-slate-900 dark:text-slate-100 text-base font-bold">12/26</p>
</div>
<button class="flex size-8 items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300">
<span class="material-symbols-outlined text-lg">content_copy</span>
</button>
</div>
<!-- CVV -->
<div class="flex items-center gap-3 bg-white dark:bg-slate-800/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm">
<div class="flex flex-col flex-1">
<p class="text-slate-500 dark:text-slate-400 text-[10px] font-medium uppercase">CVV Code</p>
<p class="text-slate-900 dark:text-slate-100 text-base font-bold">384</p>
</div>
<button class="flex size-8 items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300">
<span class="material-symbols-outlined text-lg">content_copy</span>
</button>
</div>
</div>
</div>
</div>
<!-- Management Actions -->
<div class="pt-6 space-y-3">
<button class="w-full flex items-center justify-center gap-2 h-14 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-slate-100 rounded-xl font-bold hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors shadow-sm">
<span class="material-symbols-outlined text-xl">edit</span>
                    Edit Card Details
                </button>
<button class="w-full flex items-center justify-center gap-2 h-14 bg-red-50 dark:bg-red-950/20 text-red-600 dark:text-red-400 rounded-xl font-bold border border-red-100 dark:border-red-900/30 hover:bg-red-100 transition-colors">
<span class="material-symbols-outlined text-xl">delete</span>
                    Delete Card
                </button>
</div>
</div>
<!-- Spacer for bottom padding -->
<div class="h-10"></div>
</div>
</body></html>
