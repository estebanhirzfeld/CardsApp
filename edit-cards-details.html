<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#1152d4",
              "background-light": "#f6f6f8",
              "background-dark": "#101622",
            },
            fontFamily: {
              "display": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="max-w-md mx-auto min-h-screen flex flex-col bg-white dark:bg-slate-900 shadow-xl">
<!-- Top Navigation -->
<div class="flex items-center p-4 pt-6 justify-between border-b border-slate-100 dark:border-slate-800">
<div class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 cursor-pointer transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">Edit Card Details</h2>
</div>
<!-- Scrollable Content Area -->
<div class="flex-1 overflow-y-auto pb-32">
<!-- Card Preview Section -->
<div class="p-6">
<div class="relative w-full aspect-[1.58/1] rounded-xl overflow-hidden shadow-2xl bg-gradient-to-br from-primary to-blue-400 p-6 flex flex-col justify-between text-white" data-alt="A modern virtual credit card with blue gradient background">
<div class="flex justify-between items-start">
<div class="flex flex-col">
<span class="text-xs font-medium opacity-80 uppercase tracking-widest">Virtual Card</span>
<span class="text-lg font-semibold mt-1">Traveler Rewards</span>
</div>
<span class="material-symbols-outlined text-3xl">contactless</span>
</div>
<div class="space-y-4">
<div class="text-xl font-medium tracking-[0.2em]">•••• •••• •••• 4582</div>
<div class="flex gap-8 text-xs font-light">
<div class="flex flex-col">
<span class="opacity-70 uppercase">Exp. Date</span>
<span class="font-medium text-sm">09/27</span>
</div>
<div class="flex flex-col">
<span class="opacity-70 uppercase">CVV</span>
<span class="font-medium text-sm">***</span>
</div>
</div>
</div>
</div>
</div>
<!-- Color Presets -->
<div class="px-6 py-2">
<h3 class="text-sm font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-4">Card Color</h3>
<div class="flex flex-wrap gap-4">
<label class="relative size-10 rounded-full cursor-pointer ring-primary ring-offset-2 has-[:checked]:ring-2">
<input checked="" class="sr-only" name="card-color" type="radio"/>
<div class="w-full h-full rounded-full bg-gradient-to-br from-primary to-blue-400"></div>
</label>
<label class="relative size-10 rounded-full cursor-pointer ring-primary ring-offset-2 has-[:checked]:ring-2">
<input class="sr-only" name="card-color" type="radio"/>
<div class="w-full h-full rounded-full bg-gradient-to-br from-purple-500 to-pink-500"></div>
</label>
<label class="relative size-10 rounded-full cursor-pointer ring-primary ring-offset-2 has-[:checked]:ring-2">
<input class="sr-only" name="card-color" type="radio"/>
<div class="w-full h-full rounded-full bg-gradient-to-br from-orange-400 to-red-500"></div>
</label>
<label class="relative size-10 rounded-full cursor-pointer ring-primary ring-offset-2 has-[:checked]:ring-2">
<input class="sr-only" name="card-color" type="radio"/>
<div class="w-full h-full rounded-full bg-gradient-to-br from-emerald-500 to-teal-700"></div>
</label>
<label class="relative size-10 rounded-full cursor-pointer ring-primary ring-offset-2 has-[:checked]:ring-2">
<input class="sr-only" name="card-color" type="radio"/>
<div class="w-full h-full rounded-full bg-gradient-to-br from-slate-700 to-slate-900"></div>
</label>
</div>
</div>
<!-- Form Inputs -->
<div class="px-6 py-6 space-y-5">
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Card Name</label>
<input class="w-full px-4 h-14 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" placeholder="Enter card name" type="text" value="Traveler Rewards"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Card Number</label>
<div class="relative">
<input class="w-full px-4 h-14 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" placeholder="0000 0000 0000 0000" type="text" value="4582 1234 5678 9012"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2">
<span class="material-symbols-outlined text-slate-400">credit_card</span>
</div>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Expiry Date</label>
<input class="w-full px-4 h-14 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" placeholder="MM/YY" type="text" value="09/27"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">CVV</label>
<input class="w-full px-4 h-14 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" placeholder="***" type="password" value="123"/>
</div>
</div>
</div>
</div>
<!-- Sticky Footer Action -->
<div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-6 bg-white dark:bg-slate-900 border-t border-slate-100 dark:border-slate-800">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold h-14 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98]">
                Save Changes
            </button>
</div>
</div>
</body></html>
