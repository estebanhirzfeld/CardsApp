<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
        name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1152d4",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <title>My Wallet - Minimalist Card Storage</title>
    <style>
        body {
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            overscroll-behavior-y: none;
            -webkit-tap-highlight-color: transparent;
            /* honor notch/home-bar safe areas */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(156, 163, 175, 0.5);
            border-radius: 4px;
        }

        .card-stack-item {
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.3s ease, top 0.4s ease, width 0.4s ease;
            position: absolute;
            left: 0;
            right: 0;
            margin: 0 auto;
        }

        .card-stack-item.interactive:active {
            transform: scale(0.98) translateY(var(--tw-translate-y));
        }

        .view-container {
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Modal transitions */
        .modal-box {
            transition: transform 0.25s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.25s ease;
        }


        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 100%;
        }

        /* Font for branding */
        .brand-logo {
            font-family: 'Arial', sans-serif;
            font-style: italic;
            font-weight: 900;
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 transition-colors duration-300">
    <div id="app"
        class="relative flex h-screen w-full max-w-md mx-auto flex-col overflow-hidden bg-background-light dark:bg-background-dark shadow-xl ring-1 ring-slate-900/5 sm:rounded-2xl sm:h-[850px] sm:my-8 bg-white dark:bg-slate-900">

        <!-- HOME -->
        <div id="view-home" data-display="flex" class="view-container flex h-full w-full flex-col relative">
            <header class="flex items-center justify-between p-6 bg-transparent z-10">
                <div class="flex items-center gap-3">
                    <div
                        class="size-10 rounded-full bg-primary/10 dark:bg-primary/20 flex items-center justify-center overflow-hidden border border-primary/10">
                        <span class="material-symbols-outlined text-primary">person</span>
                    </div>
                    <h1 class="text-xl font-extrabold tracking-tight">My Wallet</h1>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="navigate('edit', {id: 'new'})"
                        class="flex size-10 items-center justify-center rounded-full bg-primary text-white shadow-lg shadow-primary/30 hover:bg-primary/90 transition-all active:scale-95">
                        <span class="material-symbols-outlined text-[24px]">add</span>
                    </button>
                </div>
            </header>

            <main class="flex-1 flex flex-col items-center justify-start pt-4 px-6 relative overflow-hidden h-full">
                <div class="w-full text-center mb-8 z-10 flex-shrink-0">
                    <p class="text-sm font-semibold text-primary uppercase tracking-widest mb-1">Active Wallet</p>
                    <h2 class="text-3xl font-extrabold"><span id="home-card-count">0</span> Cards</h2>
                </div>

                <div id="home-card-stack" class="relative w-full flex-1 flex flex-col items-center z-10 mb-20"
                    style="touch-action: pan-y;">
                    <!-- Cards injected -->
                </div>

            </main>

            <footer
                class="p-8 flex flex-col items-center gap-4 z-20 mt-auto bg-gradient-to-t from-background-light dark:from-background-dark via-background-light/80 dark:via-background-dark/80 to-transparent">
                <button onclick="navigate('manage')"
                    class="w-full max-w-xs h-14 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl flex items-center justify-center gap-2 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors shadow-sm active:scale-95">
                    <span class="material-symbols-outlined text-primary">credit_card</span>
                    <span class="font-bold text-slate-900 dark:text-slate-100">Manage All Cards</span>
                </button>
                <p class="text-xs text-slate-400 dark:text-slate-500 flex items-center gap-1">
                    <span class="material-symbols-outlined text-xs">lock</span>
                    Secure Local Storage
                </p>
            </footer>
        </div>

        <!-- MANAGE -->
        <div id="view-manage" data-display="flex"
            class="view-container hidden h-full w-full flex-col relative bg-background-light dark:bg-background-dark overflow-y-auto">
            <header
                class="sticky top-0 z-20 flex items-center justify-between px-6 py-6 bg-background-light/90 dark:bg-background-dark/90 backdrop-blur-md">
                <button onclick="navigate('home')"
                    class="flex items-center justify-center w-10 h-10 rounded-full bg-slate-200/50 dark:bg-slate-800/50 text-slate-700 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
                    <span class="material-symbols-outlined text-xl">arrow_back</span>
                </button>
                <h1 class="text-lg font-bold tracking-tight">All Cards</h1>
                <button onclick="navigate('edit', {id: 'new'})"
                    class="flex items-center justify-center w-10 h-10 rounded-full bg-primary text-white shadow-lg shadow-primary/20 hover:bg-primary/90 transition-colors">
                    <span class="material-symbols-outlined text-xl">add</span>
                </button>
            </header>

            <main class="flex-1 px-6 pb-12 space-y-6 pt-4" id="manage-card-list"></main>
        </div>

        <!-- DETAILS -->
        <div id="view-details" data-display="flex"
            class="view-container hidden h-full w-full flex-col relative bg-background-light dark:bg-background-dark overflow-y-auto">
            <div
                class="flex items-center p-4 justify-between sticky top-0 z-20 bg-background-light/90 dark:bg-background-dark/90 backdrop-blur-md">
                <button onclick="navigate('home')"
                    class="text-slate-900 dark:text-slate-100 flex size-10 items-center justify-center rounded-full hover:bg-slate-200/50 dark:hover:bg-slate-800/50 transition-colors">
                    <span class="material-symbols-outlined">arrow_back</span>
                </button>
                <h2 class="text-lg font-bold flex-1 text-center">Card Details</h2>
                <div class="size-10"></div>
            </div>

            <div class="p-6 space-y-8 pb-32" id="details-content"></div>
        </div>

        <!-- EDIT/ADD -->
        <div id="view-edit" data-display="flex"
            class="view-container hidden h-full w-full flex-col relative bg-white dark:bg-slate-900 overflow-y-auto">
            <div
                class="flex items-center p-4 justify-between sticky top-0 z-20 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-b border-slate-100 dark:border-slate-800">
                <button onclick="navigate('home')"
                    class="text-slate-900 dark:text-slate-100 flex size-10 items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                    <span class="material-symbols-outlined">arrow_back</span>
                </button>
                <h2 class="text-lg font-bold flex-1 text-center pr-10" id="edit-view-title">Add Card</h2>
            </div>

            <div class="p-6 space-y-6 pb-48">
                <div id="type-toggle-container" class="flex bg-slate-100 dark:bg-slate-800 p-1 rounded-xl">
                    <button id="type-btn-payment"
                        class="flex-1 py-1.5 text-sm font-bold bg-white dark:bg-slate-700 shadow-sm rounded-lg transition-all"
                        onclick="setCardType('payment')">Payment</button>
                    <button id="type-btn-id"
                        class="flex-1 py-1.5 text-sm font-bold text-slate-500 hover:text-slate-900 dark:text-slate-400 dark:hover:text-white transition-all rounded-lg"
                        onclick="setCardType('id')">ID / Image</button>
                </div>

                <!-- Live Preview Area -->
                <div id="live-preview-container"
                    class="w-full flex justify-center perspective-[1000px] mb-8 relative z-0">
                    <!-- Preview HTML injected here -->
                </div>

                <div id="edit-form-content" class="space-y-6 relative z-10"></div>
            </div>

            <div
                class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-6 bg-white/95 dark:bg-slate-900/95 backdrop-blur-md pb-8 sm:pb-6 border-t border-slate-100 dark:border-slate-800 z-30 shadow-[0_-10px_30px_rgba(255,255,255,0.8)] dark:shadow-[0_-10px_30px_rgba(15,23,42,0.8)]">
                <button type="button" onclick="saveCurrentCard()"
                    class="w-full bg-primary hover:bg-primary/90 text-white font-bold h-14 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98]">
                    Save Card
                </button>
            </div>
        </div>

    </div>

    <!-- Modals & Toasts -->
    <div id="toast-container"
        class="fixed top-4 left-0 right-0 max-w-md mx-auto px-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <!-- Delete Card Modal -->
    <div id="delete-modal" class="fixed inset-0 z-50 hidden items-center justify-center px-6">
        <div class="absolute inset-0 bg-slate-900/50 backdrop-blur-sm" onclick="closeDeleteModal()"></div>
        <div
            class="modal-box bg-white dark:bg-slate-800 rounded-2xl p-6 w-full max-w-sm relative z-10 shadow-2xl border border-slate-100 dark:border-slate-700">
            <div
                class="w-12 h-12 rounded-full bg-red-100 dark:bg-red-900/30 flex items-center justify-center mb-4 text-red-600 dark:text-red-400">
                <span class="material-symbols-outlined">delete_forever</span>
            </div>
            <h3 class="text-xl font-bold mb-2">Delete Card?</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mb-6">This action cannot be undone. The card will be
                permanently removed from your wallet.</p>
            <div class="flex gap-3">
                <button type="button" onclick="closeDeleteModal()"
                    class="flex-1 h-12 font-semibold rounded-xl bg-slate-100 dark:bg-slate-700 text-slate-900 dark:text-slate-100 active:scale-95 transition-transform">Cancel</button>
                <button id="confirm-delete-btn" type="button"
                    class="flex-1 h-12 font-semibold rounded-xl bg-red-600 text-white shadow-lg shadow-red-600/20 active:scale-95 transition-transform">Delete</button>
            </div>
        </div>
    </div>

    <!-- Generic Confirm Action Modal (images, colors) -->
    <div id="confirm-modal" class="fixed inset-0 z-50 hidden items-center justify-center px-6">
        <div class="absolute inset-0 bg-slate-900/50 backdrop-blur-sm" onclick="closeConfirmModal()"></div>
        <div
            class="modal-box bg-white dark:bg-slate-800 rounded-2xl p-6 w-full max-w-sm relative z-10 shadow-2xl border border-slate-100 dark:border-slate-700">
            <div
                class="w-12 h-12 rounded-full bg-orange-100 dark:bg-orange-900/30 flex items-center justify-center mb-4 text-orange-500">
                <span class="material-symbols-outlined">warning</span>
            </div>
            <h3 id="confirm-modal-title" class="text-xl font-bold mb-2">Are you sure?</h3>
            <p id="confirm-modal-msg" class="text-slate-500 dark:text-slate-400 text-sm mb-6"></p>
            <div class="flex gap-3">
                <button type="button" onclick="closeConfirmModal()"
                    class="flex-1 h-12 font-semibold rounded-xl bg-slate-100 dark:bg-slate-700 text-slate-900 dark:text-slate-100 active:scale-95 transition-transform">Cancel</button>
                <button id="confirm-action-btn" type="button"
                    class="flex-1 h-12 font-semibold rounded-xl bg-red-600 text-white shadow-lg shadow-red-600/20 active:scale-95 transition-transform">Remove</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
